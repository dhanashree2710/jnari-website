<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Container */

    .login-container {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    /* Card */

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    /* Logo */

    .logo-section {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo-section img {
      width: 70px;
      margin-bottom: 10px;
    }

    .logo-section h2 {
      margin-bottom: 5px;
      color: #222;
    }

    .logo-section p {
      font-size: 14px;
      color: #777;
    }

    /* Input Box */

    .input-box {
      margin-bottom: 18px;
    }

    .input-box label {
      font-size: 13px;
      color: #444;
      margin-bottom: 6px;
      display: block;
    }

    /* Input Field */

    .input-field {
      position: relative;
      display: flex;
      align-items: center;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      transition: 0.3s;
    }

    .input-field i:first-child {
      color: #33a88e;
      margin-right: 10px;
    }

    .input-field input {
      border: none;
      outline: none;
      width: 100%;
      font-size: 14px;
    }

    /* Focus */

    .input-field:focus-within {
      border-color: #33a88e;
      box-shadow: 0 0 0 3px rgba(51, 168, 142, 0.1);
    }

    /* Eye Icon */

    .toggle-password {
      position: absolute;
      right: 10px;
      cursor: pointer;
      color: #33a88e;
      font-size: 18px;
    }

    /* Extra Options */

    .extra-options {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .extra-options a {
      text-decoration: none;
      color: #33a88e;
    }

    /* Button */

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #065e4b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-btn:hover {
      background: #33a88e;
    }

    /* Tablet */

    @media(max-width:992px) {

      .login-card {
        max-width: 500px;
      }

    }

    /* Mobile */

    @media(max-width:600px) {

      body {
        align-items: flex-start;
        padding-top: 40px;
      }

      .login-card {
        margin-top: 100px;
        max-width: 100%;
        padding: 30px 20px;
      }

      .extra-options {
        flex-direction: column;
        gap: 10px;
      }

      .logo-section img {
        width: 60px;
      }

    }

    /* POPUP OVERLAY */

    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.3s;
      z-index: 9999;
    }

    /* SHOW POPUP */

    .popup-overlay.show {
      visibility: visible;
      opacity: 1;
    }

    /* POPUP CARD */

    .popup-card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      animation: popupScale 0.3s ease;
    }

    @keyframes popupScale {
      from {
        transform: scale(0.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ICON */

    .popup-icon {
      font-size: 50px;
      margin-bottom: 15px;
    }

    /* SUCCESS */

    .popup-success {
      color: #2ecc71;
    }

    /* ERROR */

    .popup-error {
      color: #e74c3c;
    }

    /* TEXT */

    .popup-card h2 {
      margin-bottom: 10px;
    }

    .popup-card p {
      color: #666;
      margin-bottom: 25px;
    }

    /* BUTTON */

    .popup-btn {
      background: #065e4b;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .popup-btn:hover {
      background: #33a88e;
    }
  </style>

</head>

<body>

  <div class="login-container">

    <div class="login-card">

      <div class="logo-section">
        <img src="../assets/img/logo.png" alt="Logo">
        <p>Login to manage journal system</p>
      </div>

      <form id="loginForm">

        <div class="input-box">
          <label>Email Address</label>
          <div class="input-field">
            <i class="bi bi-envelope"></i>
            <input type="email" id="email" placeholder="Enter your email" required>
          </div>
        </div>

        <div class="input-box">
          <label>Password</label>
          <div class="input-field">
            <i class="bi bi-lock"></i>
            <input type="password" id="password" placeholder="Enter your password" required>
            <i class="bi bi-eye toggle-password" id="togglePassword"></i>
          </div>
        </div>

        <div class="extra-options">
          <label><input type="checkbox"> Remember me</label>
          <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">Login</button>

      </form>

    </div>

  </div>
  <!-- LOGIN POPUP -->

  <div id="popupOverlay" class="popup-overlay">

    <div class="popup-card">

      <div id="popupIcon" class="popup-icon"></div>

      <h2 id="popupTitle"></h2>

      <p id="popupMessage"></p>

      <button onclick="closePopup()" class="popup-btn">OK</button>

    </div>

  </div>
  <script>

    const toggle = document.getElementById("togglePassword");
    const password = document.getElementById("password");

    toggle.addEventListener("click", function () {

      const type = password.type === "password" ? "text" : "password";
      password.type = type;

      this.classList.toggle("bi-eye");
      this.classList.toggle("bi-eye-slash");

    });

  </script>

  <script>



    const supabaseUrl = "https://imqivfwfnjvlbvcmenki.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImltcWl2Zndmbmp2bGJ2Y21lbmtpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTg4MDYsImV4cCI6MjA4OTU3NDgwNn0.na-q6d7FnqAoTe_2oAyW7idIfvorg8kCvxe8sHgD0rQ";
  
  // Create Supabase client
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  // Popup function
  function showPopup(type, message){
    const overlay = document.getElementById("popupOverlay");
    const icon = document.getElementById("popupIcon");
    const title = document.getElementById("popupTitle");
    const msg = document.getElementById("popupMessage");

    overlay.classList.add("show");

    if(type === "success"){
      icon.innerHTML = '<i class="bi bi-check-circle-fill popup-success"></i>';
      title.innerText = "Login Successful";
      msg.innerText = message;
    }
    if(type === "error"){
      icon.innerHTML = '<i class="bi bi-x-circle-fill popup-error"></i>';
      title.innerText = "Login Failed";
      msg.innerText = message;
    }
  }

  function closePopup(){
    document.getElementById("popupOverlay").classList.remove("show");
  }

  // Login form
  const form = document.getElementById("loginForm");

  form.addEventListener("submit", async (e)=>{
    e.preventDefault();

    const emailInput = document.getElementById("email").value.trim().toLowerCase();
    const passwordInput = document.getElementById("password").value.trim();

    console.log("Input Email:", emailInput);
    console.log("Input Password:", passwordInput);

    try {
      // Fetch all admin users (robust method)
      const { data, error } = await supabaseClient
        .from("admin")
        .select("*");

      if(error) throw error;

      console.log("Supabase admin rows:", data);

      // Find user by email (case-insensitive)
      const user = data.find(u => u.email.trim().toLowerCase() === emailInput);

      if(user){
        console.log("User fetched from DB:", user);

        if(user.password === passwordInput){
          console.log("Password matched!");
          showPopup("success","Welcome Admin!");
          setTimeout(()=>{ window.location.href="dashboard.html"; }, 1500);
        } else {
          console.log("Password mismatch:", user.password, passwordInput);
          showPopup("error","Invalid Email or Password");
        }

      } else {
        console.log("No user found with this email");
        showPopup("error","Invalid Email or Password");
      }

    } catch(err){
      console.log("Caught Error:", err);
      showPopup("error", err.message);
    }

  });
</script>
</body>

</html>
